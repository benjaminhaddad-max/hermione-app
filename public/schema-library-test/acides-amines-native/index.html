<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Galerie test - Acides amines</title>
    <style>
      :root {
        --bg: #0e0a1f;
        --card: #171130;
        --text: #f8f7ff;
        --muted: #b8b3d6;
        --accent: #c9a84c;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: radial-gradient(circle at top, #1d1540 0, var(--bg) 55%);
        color: var(--text);
      }
      .wrap {
        max-width: 1200px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 30px;
      }
      p {
        margin: 0 0 16px;
        color: var(--muted);
      }
      .toolbar {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-bottom: 20px;
      }
      .chip {
        border: 1px solid rgba(255, 255, 255, 0.2);
        border-radius: 999px;
        padding: 6px 12px;
        color: var(--accent);
        font-weight: 700;
        font-size: 13px;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }
      .card {
        background: var(--card);
        border: 1px solid rgba(255, 255, 255, 0.14);
        border-radius: 12px;
        overflow: hidden;
      }
      .card img {
        width: 100%;
        background: #fff;
        display: block;
      }
      .meta {
        padding: 10px;
        font-size: 12px;
        color: var(--muted);
      }
      .meta strong {
        color: #fff;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>Galerie test - extraction native</h1>
      <p>Polycopie Acides amines: visualisation des images natives + legendes.</p>
      <div class="toolbar">
        <span class="chip" id="count">Chargement...</span>
      </div>
      <div class="grid" id="grid"></div>
    </div>

    <script>
      async function main() {
        let res = await fetch("./manifest.split.labeled.json", { cache: "no-store" });
        if (!res.ok) res = await fetch("./manifest.labeled.json", { cache: "no-store" });
        if (!res.ok) res = await fetch("./manifest.split.json", { cache: "no-store" });
        if (!res.ok) res = await fetch("./manifest.json", { cache: "no-store" });
        const data = await res.json();
        document.getElementById("count").textContent = `${data.length} images`;
        const grid = document.getElementById("grid");
        data.forEach((row) => {
          const card = document.createElement("article");
          card.className = "card";
          const src = row.image ? row.image : `./${row.file.split("/").pop()}`;
          const legend = row.legende || "Legende en cours";
          card.innerHTML = `
            <a href="${src}" target="_blank" rel="noreferrer">
              <img loading="lazy" src="${src}" alt="${src}" />
            </a>
            <div class="meta">
              <strong>Page ${row.page}</strong> · ${row.width}x${row.height}<br />
              ${legend}
            </div>
          `;
          grid.appendChild(card);
        });
      }
      main();
    </script>
  </body>
</html>
